name: Nightly Playwright Tests

on:
  schedule:
    - cron: '30 2 * * *'

jobs:
  regression-ui:
    uses: ./.github/workflows/playwright.yml
    with:
      environment: test
      tag: "@regression"
    secrets: inherit
  regression-api:
    uses: ./.github/workflows/playwright.api.yml
    with:
      environment: test
      # tag: "@regression"
    secrets: inherit